name: Auto Sync & Release

on:
  schedule:
    - cron: '0 0 * * *' # 每天早上 8 点自动运行
  workflow_dispatch: # 允许手动运行

jobs:
  sync-patch-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 1. 强制拉取上游最新代码
        run: |
          git remote add upstream https://github.com/hwsaya/installerx-revived.git || true
          git fetch upstream
          git reset --hard upstream/main

      - name: 2. 修改包名，并清理原作者脚本
        run: |
          python -c '
          import re, os

          # 修改 build.gradle.kts
          gradle_path = "app/build.gradle.kts"
          if os.path.exists(gradle_path):
              with open(gradle_path, "r", encoding="utf-8") as f:
                  code = f.read()
              code = re.sub(r"applicationId\s*=\s*project\.findProperty\(\"APP_ID\"\)\s*as\s*String\?\s*\n\s*\?\:\s*\".*?\"", "applicationId = \"com.android.packageinstaller\"", code)
              code = re.sub(r"applicationId\s*=\s*\".*?\"", "applicationId = \"com.android.packageinstaller\"", code)
              code = re.sub(r"versionName\s*=\s*\".*?\"", "versionName = \"16\"", code)
              with open(gradle_path, "w", encoding="utf-8") as f:
                  f.write(code)

          # 删除原作者脚本防止重复运行
          for wf in ["auto-preview-release.yml", "manual-stable-release.yml"]:
              wf_path = f".github/workflows/{wf}"
              if os.path.exists(wf_path):
                  os.remove(wf_path)
          '

      - name: 3. 提交代码到你的仓库
        run: |
          git add .
          git commit -m "Auto sync, patch ID and clean workflows" || echo "No changes"
          git push origin main --force

      - name: 4. 配置 Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: 5. 赋予编译权限
        run: chmod +x ./gradlew

      - name: 6. 开始编译 APK
        # 修复点：这里必须传入 GITHUB_ACTOR 和 GITHUB_TOKEN，否则 settings.gradle.kts 会报错
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleOnlinePreviewRelease assembleOfflinePreviewRelease

      - name: 7. 提取并重命名 APK
        id: rename_apks
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          YY_MM=$(date +'%y.%m')
          VERSION_TAG="${YY_MM}.${SHORT_SHA}"

          ONLINE_APK_DIR="app/build/outputs/apk/onlinePreview/release/"
          OFFLINE_APK_DIR="app/build/outputs/apk/offlinePreview/release/"

          ONLINE_APK_PATH=$(find "$ONLINE_APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)
          OFFLINE_APK_PATH=$(find "$OFFLINE_APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)

          NEW_ONLINE_APK_PATH="${ONLINE_APK_DIR}InstallerX-Revived-online-${VERSION_TAG}.apk"
          NEW_OFFLINE_APK_PATH="${OFFLINE_APK_DIR}InstallerX-Revived-offline-${VERSION_TAG}.apk"

          mv "$ONLINE_APK_PATH" "$NEW_ONLINE_APK_PATH"
          mv "$OFFLINE_APK_PATH" "$NEW_OFFLINE_APK_PATH"

          echo "online_apk=${NEW_ONLINE_APK_PATH}" >> $GITHUB_OUTPUT
          echo "offline_apk=${NEW_OFFLINE_APK_PATH}" >> $GITHUB_OUTPUT
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT

      - name: 8. 自动清理旧的测试版 Release (保持仓库整洁)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(git tag --list --sort=-creatordate | grep -E '^[0-9]+\.[0-9]+\.[a-f0-9]{7,}$' | head -n 1)
          if [[ -n "$LATEST_TAG" ]]; then
            gh release delete "$LATEST_TAG" --yes || true
            git push origin --delete "$LATEST_TAG" || true
          fi

      - name: 9. 🌟 发布到 GitHub Releases 🌟
        uses: softprops/action-gh-release@v2
        with:
          name: "InstallerX-Revived 专属定制版"
          tag_name: "${{ steps.rename_apks.outputs.version_tag }}"
          target_commitish: ${{ github.sha }}
          body: |
            ## 自动同步最新版
            - **包名 (App ID):** `com.android.packageinstaller`
            - **VersionName:** `16`
            - 此版本已自动移除多余的 Telegram 通知步骤。
          prerelease: true
          files: |
            ${{ steps.rename_apks.outputs.online_apk }}
            ${{ steps.rename_apks.outputs.offline_apk }}
