name: Auto Sync & Build

on:
  schedule:
    - cron: '0 0 * * *' # 每天早上 8 点自动运行
  workflow_dispatch: # 允许你随时手动点击运行

jobs:
  sync-patch-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 1. 强制拉取上游最新代码
        run: |
          git remote add upstream https://github.com/hwsaya/installerx-revived.git || true
          git fetch upstream
          git reset --hard upstream/main

      - name: 2. 修改包名，并彻底删掉原作者的报错脚本
        run: |
          python -c '
          import re, os

          # --- 修改 build.gradle.kts ---
          gradle_path = "app/build.gradle.kts"
          if os.path.exists(gradle_path):
              with open(gradle_path, "r", encoding="utf-8") as f:
                  code = f.read()
              # 强行替换包名为系统安装器
              code = re.sub(r"applicationId\s*=\s*project\.findProperty\(\"APP_ID\"\)\s*as\s*String\?\s*\n\s*\?\:\s*\".*?\"", "applicationId = \"com.android.packageinstaller\"", code)
              code = re.sub(r"applicationId\s*=\s*\".*?\"", "applicationId = \"com.android.packageinstaller\"", code)
              # 强行替换版本显示
              code = re.sub(r"versionName\s*=\s*\".*?\"", "versionName = \"16\"", code)
              with open(gradle_path, "w", encoding="utf-8") as f:
                  f.write(code)

          # --- 直接删掉原作者的打包和TG发布脚本，防止重复运行报错 ---
          for wf in ["auto-preview-release.yml", "manual-stable-release.yml"]:
              wf_path = f".github/workflows/{wf}"
              if os.path.exists(wf_path):
                  os.remove(wf_path)
          '

      - name: 3. 提交修改的代码到你的仓库
        run: |
          git add .
          git commit -m "Auto sync, patch ID and clean workflows" || echo "No changes"
          git push origin main --force

      - name: 4. 配置 Java 25 和 Gradle (准备编译)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: 5. 赋予编译权限
        run: chmod +x ./gradlew

      - name: 6. 开始编译 APK (可能需要 3-5 分钟)
        run: ./gradlew assembleOnlinePreviewRelease assembleOfflinePreviewRelease

      - name: 7. 🌟 提取产物并上传到网页底部 🌟
        uses: actions/upload-artifact@v4
        with:
          name: patched-installer-apks # 下载下来的压缩包名字
          path: app/build/outputs/apk/**/*.apk # 自动抓取所有编译好的 APK
